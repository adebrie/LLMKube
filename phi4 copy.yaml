apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3.6
  namespace: llmkube-system
spec:
  source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
  format: gguf
  hardware:
    accelerator: intel
    gpu:
      enabled: true
      count: 1
      vendor: intel
      layers: -1
  resources:
    cpu: "2"
    memory: "4Gi"
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3.6
  namespace: llmkube-system
spec:
  modelRef: qwen3.6
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-intel
  priorityClassName: llmkube-llmkube-normal
  resources:
    gpu: 1
    cpu: "6"
    memory: "20Gi"
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
